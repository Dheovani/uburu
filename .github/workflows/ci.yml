name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite

jobs:
  windows-msvc-core:
    name: Windows MSVC core
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare vcpkg cache directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force .vcpkg-cache | Out-Null

      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-windows-msvc-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-windows-msvc-

      - name: Configure
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
        run: cmake --preset core-windows-msvc-werror-debug

      - name: Build
        run: cmake --build --preset core-windows-msvc-werror-debug

      - name: Test
        run: ctest --preset core-windows-msvc-werror-debug

      - name: Format check
        run: cmake --build build/core-windows-msvc-werror-debug --config Debug --target format-check

  linux-core:
    name: Linux core
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare vcpkg cache directory
        run: mkdir -p .vcpkg-cache

      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-linux-

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy ninja-build

      - name: Configure
        env:
          VCPKG_ROOT: /usr/local/share/vcpkg
        run: cmake --preset core-linux-werror-debug

      - name: Build
        run: cmake --build --preset core-linux-werror-debug

      - name: Test
        run: ctest --preset core-linux-werror-debug

      - name: Format check
        run: cmake --build build/core-linux-werror-debug --target format-check

      - name: Static analysis
        run: cmake --build build/core-linux-werror-debug --target tidy

  linux-sanitizers:
    name: Linux sanitizers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare vcpkg cache directory
        run: mkdir -p .vcpkg-cache

      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-linux-

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        env:
          VCPKG_ROOT: /usr/local/share/vcpkg
        run: cmake --preset core-linux-sanitize-debug

      - name: Build
        run: cmake --build --preset core-linux-sanitize-debug

      - name: Test
        run: ctest --preset core-linux-sanitize-debug

  linux-coverage:
    name: Linux coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare vcpkg cache directory
        run: mkdir -p .vcpkg-cache

      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-linux-

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y gcovr ninja-build

      - name: Configure
        env:
          VCPKG_ROOT: /usr/local/share/vcpkg
        run: cmake --preset core-linux-coverage-debug

      - name: Build
        run: cmake --build --preset core-linux-coverage-debug

      - name: Coverage
        run: cmake --build --preset coverage

      - name: Publish coverage report
        uses: actions/upload-artifact@v4
        with:
          name: linux-coverage-report
          path: build/core-linux-coverage-debug/coverage
